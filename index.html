<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Wedding Photobooth</title>

<style>
body{
margin:0;
font-family:Georgia,serif;
background:linear-gradient(to bottom,#faf6f0,#f2e8dc);
display:flex;
height:100vh;
overflow:hidden;
color:#444; /* ตัวอักษรเทาเข้ม */
}

/* ===== ปุ่มด้านซ้าย ===== */
.sidebar{
width:130px;
display:flex;
flex-direction:column;
gap:12px;
padding:20px 10px;
box-sizing:border-box;
}

button{
border:none;
padding:12px;
border-radius:999px;
font-weight:600;
cursor:pointer;
transition:.25s;
box-shadow:0 6px 15px rgba(0,0,0,.08);
color:#444;
}

.albumBtn{background:linear-gradient(135deg,#f7e7ce,#e8cfa5);}
.uploadBtn{background:linear-gradient(135deg,#f5e6e8,#e6cfd2);}
.saveBtn{background:linear-gradient(135deg,#e6d7b9,#d4b483);}

button:hover{transform:translateY(-2px);}

/* ===== พื้นที่กรอบ ===== */
.main{
flex:1;
display:flex;
align-items:center;
justify-content:flex-end; /* ดันกรอบไปขวา */
padding-right:30px;
}

canvas{
height:95vh;
width:auto;
max-width:100%;
touch-action:none;
}

/* ===== Album Overlay ===== */
#albumOverlay{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.85);
z-index:3000;
flex-direction:column;
align-items:center;
justify-content:center;
}

#albumOverlay img{
max-width:95vw;
max-height:80vh;
border-radius:16px;
box-shadow:0 10px 40px rgba(0,0,0,0.5);
cursor:pointer;
}

.thumbRow{
display:flex;
gap:12px;
margin-top:20px;
}

.thumbRow img{
width:80px;
height:80px;
object-fit:cover;
border-radius:12px;
border:3px solid white;
cursor:pointer;
}
</style>
</head>

<body>

<div class="sidebar">
<button class="albumBtn" onclick="openAlbum()">Wedding Album</button>
<button class="uploadBtn" onclick="openUpload()">Upload</button>
<button class="saveBtn" onclick="saveImage()">Save</button>
</div>

<div class="main">
<canvas id="canvas" width="707" height="2000"></canvas>
</div>

<input type="file" id="fileInput" accept="image/*" style="display:none">

<div id="albumOverlay">
<img id="preview">
<div class="thumbRow">
<img src="226A6528.jpg">
<img src="226A6569.jpg">
<img src="226A6696.jpg">
</div>
<button onclick="closeAlbum()" style="margin-top:20px;padding:8px 16px;border-radius:999px;">Close</button>
</div>

<script>
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");
const fileInput=document.getElementById("fileInput");
const overlay=document.getElementById("albumOverlay");
const preview=document.getElementById("preview");
const thumbs=document.querySelectorAll(".thumbRow img");

const frame=new Image();
frame.src="Photobooth.png";

/* ช่องรูป */
const slots=[
{x:45,y:53,w:617,h:444},
{x:45,y:562,w:617,h:444},
{x:45,y:1071,w:617,h:444}
];

let images=slots.map(()=>({img:null,x:0,y:0,scale:1}));
let active=-1;

/* เลือกช่อง */
canvas.addEventListener("click",e=>{
const r=canvas.getBoundingClientRect();
const x=(e.clientX-r.left)*(canvas.width/r.width);
const y=(e.clientY-r.top)*(canvas.height/r.height);
active=-1;
slots.forEach((s,i)=>{
if(x>s.x&&x<s.x+s.w&&y>s.y&&y<s.y+s.h) active=i;
});
});

/* อัลบั้ม */
function openAlbum(){
if(active===-1){alert("Select frame first");return;}
overlay.style.display="flex";
preview.src=thumbs[0].src;
}

function closeAlbum(){
overlay.style.display="none";
}

thumbs.forEach(t=>{
t.addEventListener("click",()=>preview.src=t.src);
});

preview.addEventListener("click",()=>{
loadImage(preview.src);
closeAlbum();
});

/* อัปโหลด */
function openUpload(){
if(active===-1){alert("Select frame first");return;}
fileInput.click();
}

fileInput.onchange=e=>{
const reader=new FileReader();
reader.onload=ev=>loadImage(ev.target.result);
reader.readAsDataURL(e.target.files[0]);
};

/* โหลดรูป (พอดีกรอบ ไม่ครอป) */
function loadImage(src){
const img=new Image();
img.onload=()=>{
const s=slots[active];

const baseScale = s.w / img.width; // พอดีแนวนอน

images[active]={
img,
x:0,
y:0,
scale:baseScale,
minScale:baseScale,   // ห้ามเล็กกว่านี้
maxScale:baseScale*4  // ซูมได้ 4 เท่า
};
};
img.src=src;
}

/* ===== Touch Zoom ===== */
let isDragging=false,startX=0,startY=0,startDist=0,startScale=1;

canvas.addEventListener("touchstart",e=>{
if(active===-1)return;

if(e.touches.length===1){
isDragging=true;
startX=e.touches[0].clientX;
startY=e.touches[0].clientY;
}

if(e.touches.length===2){
isDragging=false;
startDist=getDist(e.touches[0],e.touches[1]);
startScale=images[active].scale;
}
},{passive:false});

canvas.addEventListener("touchmove",e=>{
if(active===-1)return;
e.preventDefault();

if(e.touches.length===1 && isDragging){
let dx=e.touches[0].clientX-startX;
let dy=e.touches[0].clientY-startY;
images[active].x+=dx;
images[active].y+=dy;
startX=e.touches[0].clientX;
startY=e.touches[0].clientY;
}

if(e.touches.length===2){
let newDist=getDist(e.touches[0],e.touches[1]);
let ratio=newDist/startDist;
let d = images[active];
d.scale = startScale * ratio;

/* ล็อกไม่ให้เล็กกว่าพอดีกรอบ */
d.scale = Math.max(d.minScale, Math.min(d.maxScale, d.scale));
}
},{passive:false});

canvas.addEventListener("touchend",()=>isDragging=false);

function getDist(a,b){
return Math.hypot(b.clientX-a.clientX,b.clientY-a.clientY);
}

/* DRAW */
function draw(){
ctx.clearRect(0,0,707,2000);

slots.forEach((s,i)=>{
let d=images[i];
if(d.img){
ctx.save();
ctx.beginPath();
ctx.rect(s.x,s.y,s.w,s.h);
ctx.clip();

let iw=d.img.width*d.scale;
let ih=d.img.height*d.scale;

ctx.drawImage(d.img,
s.x+(s.w-iw)/2+d.x,
s.y+(s.h-ih)/2+d.y,
iw,ih);

ctx.restore();
}
});

if(frame.complete) ctx.drawImage(frame,0,0,707,2000);
requestAnimationFrame(draw);
}
draw();

/* SAVE */
function saveImage(){
canvas.toBlob(blob=>{
const file=new File([blob],"Wedding.png",{type:"image/png"});
if(navigator.share && navigator.canShare({files:[file]})){
navigator.share({files:[file],title:"Wedding Photobooth"});
}else{
const a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="Wedding.png";
a.click();
}
});
}
</script>
</body>
</html>
